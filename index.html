    <script>

        // 🔥 本地兜底文案

        tailwind.config = {

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            background-color: #1a1a2e; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass-bg { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        /* 🔥 超紧凑粒子特效 */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            z-index: 10000;
            opacity: 1;
            will-change: transform, opacity;
        }
        
        /* 滑动背景 */
        .tab-slider {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 6px);
            height: calc(100% - 8px);
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 1;
            background: rgba(255, 107, 157, 0.15);
            backdrop-filter: blur(10px);
        }
        
        .pet-tabs-container {
            position: relative;
            display: flex;
            gap: 4px;
            padding: 4px;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            margin-bottom: 2rem;
        }
        
        /* 模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            animation: fade-in 0.2s ease-out;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 24px;
            max-width: 95%;
            max-height: 95%;
            overflow: auto;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        
        #cameraPreview {
            transform: scaleX(-1);
        }
        
        .bar { 
            transition: height 0.2s; 
        }

        #wechatOpenTip {
            display: none;
            position: fixed;
            left: 12px;
            right: 12px;
            bottom: 12px;
            z-index: 30000;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #f5f5f5;
        }

        /* 新增：录音动画容器样式 */
        .record-animation {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            margin: 20px 0;
        }
        .record-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FF6B9D;
            animation: wave 0.8s infinite ease-in-out;
        }
        .record-dot:nth-child(2) { animation-delay: 0.2s; }
        .record-dot:nth-child(3) { animation-delay: 0.4s; }
        .dog-record-dot { background: #4A9FFF; }

        @media (max-width: 640px) {
            #particles-container, .particle {
                display: none !important;
            }
            h1 {
                font-size: 1.8rem !important;
            }
            .glass-bg {
                backdrop-filter: blur(6px);
            }
        }
    </style>
</head>

    <script>
        // ========== 全局状态（新增：管理录音/API状态）==========
        let currentPet = 'cat';
        let mediaRecorder = null; // 录音器实例
        let audioChunks = [];     // 录音数据
        let isRecording = false;  // 录音状态

        // ========== 粒子特效：点击按钮触发 ==========
        function createParticleExplosion(x, y, isCat) {
            const container = document.getElementById('particles-container');
            if (!container) return;

            const colors = isCat
                ? ['#FF6B9D', '#FF8EAD', '#FFB3C6', '#FF6B6B', '#FF8A65']
                : ['#4A9FFF', '#6BB5FF', '#8DC8FF', '#4A6FFF', '#6B8FFF'];

            const particleCount = 16;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                const size = Math.random() * 7 + 3;
                const color = colors[Math.floor(Math.random() * colors.length)];

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.backgroundColor = color;
                particle.style.boxShadow = `0 0 12px ${color}`;

                const offsetX = (Math.random() - 0.5) * 16;
                const offsetY = (Math.random() - 0.5) * 16;

                particle.style.left = `${x + offsetX}px`;
                particle.style.top = `${y + offsetY}px`;

                container.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3.4 + 2.2;

                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;

                const friction = 0.985;
                const lifeMs = 260 + Math.random() * 150;
                const start = performance.now();

                let px = 0;
                let py = 0;

                function tick(now) {
                    const t = now - start;
                    const p = Math.min(1, t / lifeMs);

                    vx *= friction;
                    vy *= friction;

                    px += vx;
                    py += vy;

                    particle.style.transform = `translate(${px}px, ${py}px)`;
                    particle.style.opacity = `${1 - p}`;

                    if (p < 1) requestAnimationFrame(tick);
                    else particle.remove();
                }

                requestAnimationFrame(tick);
            }
        }

        // ========== 物种状态（优化：同步录音动画样式）==========
        function setActivePet(pet) {
            currentPet = pet;

            const catBtn = document.getElementById('catBtn');
            const dogBtn = document.getElementById('dogBtn');
            const tabSlider = document.getElementById('tabSlider');
            const recordPulse = document.getElementById('recordPulse');
            const recordDots = document.getElementById('recordDots');
            const loadingEmoji = document.getElementById('loadingEmoji');
            const resultEmoji = document.getElementById('resultEmoji');
            const actionHint = document.getElementById('actionHint');
            
            if (!catBtn || !dogBtn || !tabSlider) return;

            const isCat = pet === 'cat';

            // 切换标签样式
            tabSlider.style.transform = isCat ? 'translateX(0)' : 'translateX(100%)';
            tabSlider.style.background = isCat ? 'rgba(255, 107, 157, 0.15)' : 'rgba(74, 159, 255, 0.15)';

            catBtn.classList.toggle('text-white', isCat);
            catBtn.classList.toggle('text-gray-400', !isCat);
            dogBtn.classList.toggle('text-white', !isCat);
            dogBtn.classList.toggle('text-gray-400', isCat);

            // 切换录音动画样式
            if (recordPulse) {
                recordPulse.className = isCat 
                    ? 'w-24 h-24 rounded-full animate-record-pulse flex items-center justify-center text-4xl mb-6'
                    : 'w-24 h-24 rounded-full animate-dog-record-pulse flex items-center justify-center text-4xl mb-6';
            }
            
            if (recordDots) {
                const dots = recordDots.querySelectorAll('.record-dot');
                dots.forEach(dot => {
                    dot.className = isCat ? 'record-dot' : 'record-dot dog-record-dot';
                });
            }

            // 切换表情/提示文字
            if (loadingEmoji) loadingEmoji.textContent = isCat ? '🐱' : '🐶';
            if (resultEmoji) resultEmoji.textContent = isCat ? '🐱' : '🐶';
            if (actionHint) actionHint.textContent = isCat ? '录下猫主子的圣旨...' : '录下打工狗的汪汪...';
        }

        // ========== 小功能：显示/隐藏 Key ==========
        function bindToggleKey() {
            const apiKeyInput = document.getElementById('apiKeyInput');
            const toggleKey = document.getElementById('toggleKey');
            if (!apiKeyInput || !toggleKey) return;

            toggleKey.addEventListener('click', (e) => {
                e.preventDefault();
                apiKeyInput.type = apiKeyInput.type === 'password' ? 'text' : 'password';
                const icon = toggleKey.querySelector('i');
                if (icon) icon.className = apiKeyInput.type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
            });
        }

        // ========== 视图切换（优化：统一管理）==========
        function setView(view) {
            const idleView = document.getElementById('idleView');
            const loadingView = document.getElementById('loadingView');
            const resultView = document.getElementById('resultView');

            if (!idleView || !loadingView || !resultView) return;

            idleView.classList.toggle('hidden', view !== 'idle');
            loadingView.classList.toggle('hidden', view !== 'loading');
            resultView.classList.toggle('hidden', view !== 'result');
            
            // 切换视图时停止录音
            if (view !== 'loading' && isRecording) {
                stopRecording();
            }
        }

        function setResultText(text) {
            const resultText = document.getElementById('resultText');
            if (resultText) resultText.textContent = text;
        }

        function pickFallback(pet) {
            const list = FALLBACK?.[pet] || FALLBACK?.cat || ['...'];
            return list[Math.floor(Math.random() * list.length)];
        }

        function getApiKey() {
            const key = document.getElementById('apiKeyInput')?.value?.trim() || '';
            // 修复：API Key 格式校验
            if (!key.startsWith('sk-') || key.length < 10) {
                alert('请输入有效的 DeepSeek API Key（以 sk- 开头）');
                return '';
            }
            return key;
        }

        function isAdvancedVisionEnabled() {
            return Boolean(document.getElementById('advancedVisionToggle')?.checked);
        }

        function updateLoadingText(title, subtext, emoji) {
            const loadingTitle = document.getElementById('loadingTitle');
            const loadingSubtext = document.getElementById('loadingSubtext');
            const loadingEmoji = document.getElementById('loadingEmoji');
            if (loadingTitle) loadingTitle.textContent = title;
            if (loadingSubtext) loadingSubtext.textContent = subtext;
            if (loadingEmoji && emoji) loadingEmoji.textContent = emoji;
        }

        // ========== 录音功能（新增：完整录音逻辑）==========
        async function startRecording() {
            try {
                // 检查权限
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                isRecording = true;

                // 收集录音数据
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                // 录音结束后自动处理
                mediaRecorder.onstop = async () => {
                    isRecording = false;
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    await processAudioFile(audioBlob); // 处理录音文件
                    
                    // 停止摄像头流
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                setView('loading');
                updateLoadingText('正在录音中...', '说完后自动识别，稍等 🎧', currentPet === 'cat' ? '🐱' : '🐶');
                
                // 模拟录音时长（5秒后自动停止，可根据需求调整）
                setTimeout(() => {
                    if (isRecording) stopRecording();
                }, 5000);

            } catch (err) {
                alert(`录音权限申请失败：${err.message}\n请检查浏览器权限设置`);
                setView('idle');
                isRecording = false;
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                updateLoadingText('正在识别语音...', '解析毛孩子的心声中 🧠', currentPet === 'cat' ? '🐱' : '🐶');
            }
        }

        // ========== 拍照功能修复（完整实现）==========
        function bindCameraFunctions() {
            const takePhotoBtn = document.getElementById('takePhotoBtn');
            const cameraModal = document.getElementById('cameraModal');
            const closeCameraBtn = document.getElementById('closeCameraBtn');
            const captureBtn = document.getElementById('captureBtn');
            const switchCameraBtn = document.getElementById('switchCameraBtn');
            const cameraPreview = document.getElementById('cameraPreview');
            const photoCanvas = document.getElementById('photoCanvas');

            let stream = null;
            let facingMode = 'environment'; // 默认为后置摄像头

            // 打开相机
            takePhotoBtn?.addEventListener('click', async () => {
                try {
                    // 关闭现有流
                    if (stream) stream.getTracks().forEach(t => t.stop());
                    
                    // 请求摄像头权限
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: facingMode }
                    });
                    
                    cameraPreview.srcObject = stream;
                    cameraModal.classList.remove('hidden');
                } catch (err) {
                    alert(`摄像头权限申请失败：${err.message}\n请检查浏览器权限设置`);
                }
            });

            // 关闭相机
            closeCameraBtn?.addEventListener('click', () => {
                if (stream) stream.getTracks().forEach(t => t.stop());
                cameraModal.classList.add('hidden');
                cameraPreview.srcObject = null;
            });

            // 切换前后摄像头
            switchCameraBtn?.addEventListener('click', async () => {
                facingMode = facingMode === 'environment' ? 'user' : 'environment';
                if (stream) stream.getTracks().forEach(t => t.stop());
                
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: facingMode }
                    });
                    cameraPreview.srcObject = stream;
                } catch (err) {
                    alert(`切换摄像头失败：${err.message}`);
                }
            });

            // 拍照并处理
            captureBtn?.addEventListener('click', async () => {
                try {
                    // 绘制到画布
                    const width = cameraPreview.videoWidth || 640;
                    const height = cameraPreview.videoHeight || 480;
                    photoCanvas.width = width;
                    photoCanvas.height = height;
                    const ctx = photoCanvas.getContext('2d');
                    ctx.drawImage(cameraPreview, 0, 0, width, height);
                    
                    // 转为Blob
                    photoCanvas.toBlob(async (blob) => {
                        // 关闭相机
                        if (stream) stream.getTracks().forEach(t => t.stop());
                        cameraModal.classList.add('hidden');
                        
                        // 处理图片
                        setView('loading');
                        updateLoadingText('正在识别图片...', '分析毛孩子的表情 😺', currentPet === 'cat' ? '🐱' : '🐶');
                        
                        await processImageFile(blob);
                    }, 'image/jpeg', 0.8);
                } catch (err) {
                    alert(`拍照失败：${err.message}`);
                }
            });
        }

        // ========== 文件处理核心逻辑（修复：API Key 校验 + 文案时机）==========
        async function processAudioFile(file) {
            const apiKey = getApiKey();
            if (!apiKey) {
                // 无有效API Key时延迟显示兜底文案（优化：避免文案过早出现）
                setTimeout(() => {
                    setView('result');
                    setResultText(pickFallback(currentPet));
                }, 1500);
                return;
            }

            try {
                updateLoadingText('正在转写语音...', '把声音转成文字 📝', currentPet === 'cat' ? '🐱' : '🐶');
                const transcript = await transcribeMedia(file, apiKey);
                
                updateLoadingText('正在生成吐槽...', '让AI帮毛孩子说话 🗣️', currentPet === 'cat' ? '🐱' : '🐶');
                const finalText = await roastByContext({
                    transcript,
                    visualDesc: '',
                    file,
                    apiKey,
                    pet: currentPet
                });

                // 确保有内容后再显示（优化：避免空文案）
                setTimeout(() => {
                    setView('result');
                    setResultText(finalText || pickFallback(currentPet));
                }, 800);

            } catch (err) {
                // 失败时延迟显示兜底文案
                setTimeout(() => {
                    setView('result');
                    setResultText(`😭 识别失败：${err.message}\n\n已为你生成趣味吐槽：\n${pickFallback(currentPet)}`);
                }, 1200);
            }
        }

        async function processImageFile(file) {
            const apiKey = getApiKey();
            if (!apiKey) {
                setTimeout(() => {
                    setView('result');
                    setResultText(pickFallback(currentPet));
                }, 1500);
                return;
            }

            try {
                updateLoadingText('正在分析图片...', '读取毛孩子的表情 🐾', currentPet === 'cat' ? '🐱' : '🐶');
                const visualDesc = await describeImageOrVideo(file, [], apiKey);
                
                updateLoadingText('正在生成吐槽...', '把画面变成有趣的话 🗨️', currentPet === 'cat' ? '🐱' : '🐶');
                const finalText = await roastByContext({
                    transcript: '',
                    visualDesc,
                    file,
                    apiKey,
                    pet: currentPet
                });

                setTimeout(() => {
                    setView('result');
                    setResultText(finalText || pickFallback(currentPet));
                }, 800);

            } catch (err) {
                setTimeout(() => {
                    setView('result');
                    setResultText(`😭 识别失败：${err.message}\n\n已为你生成趣味吐槽：\n${pickFallback(currentPet)}`);
                }, 1200);
            }
        }

        // ========== 网络请求（修复：超时逻辑 + API Key 传递）==========
        async function withTimeout(promiseFactory, ms, label) {
            let timer = null;
            try {
                return await Promise.race([
                    promiseFactory(),
                    new Promise((_, reject) => {
                        timer = setTimeout(() => reject(new Error(`${label}超时（>${Math.round(ms / 1000)}s）`)), ms);
                    })
                ]);
            } finally {
                if (timer) clearTimeout(timer);
            }
        }

        async function fetchWithTimeout(url, options, timeoutMs = 20000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
                return await fetch(url, { ...options, signal: controller.signal });
            } catch (err) {
                if (err?.name === 'AbortError') throw new Error(`网络请求超时（>${Math.round(timeoutMs / 1000)}s）`);
                throw err;
            } finally {
                clearTimeout(timer);
            }
        }

        async function transcribeMedia(file, apiKey) {
            if (!apiKey) return '';
            if (!file.type.startsWith('audio/') && !file.type.startsWith('video/')) return '';

            const formData = new FormData();
            formData.append('file', file, file.name || 'recording.wav');
            formData.append('model', SYSTEM_CONFIG.audioModel);

            const resp = await fetchWithTimeout(SYSTEM_CONFIG.audioUrl, {
                method: 'POST',
                headers: {
                    Authorization: `Bearer ${apiKey}`,
                    // 修复：移除Content-Type，让浏览器自动设置（包含boundary）
                },
                body: formData
            }, 25000);

            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error(`转写失败：${resp.status} ${errText || ''}`.trim());
            }

            const data = await resp.json();
            return data?.text?.trim() || '';
        }

        async function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = () => reject(new Error('读取文件失败'));
                reader.readAsDataURL(file);
            });
        }

        async function extractVideoFrames(file, count = 3) {
            if (!file.type.startsWith('video/')) return [];

            const video = document.createElement('video');
            video.preload = 'metadata';
            video.muted = true;
            video.playsInline = true;

            const objectUrl = URL.createObjectURL(file);
            video.src = objectUrl;

            try {
                await withTimeout(
                    () =>
                        new Promise((resolve, reject) => {
                            const onMeta = () => resolve();
                            const onError = () => reject(new Error('视频元数据读取失败'));
                            video.addEventListener('loadedmetadata', onMeta, { once: true });
                            video.addEventListener('error', onError, { once: true });
                        }),
                    6000,
                    '视频元数据读取'
                );

                const duration = Number(video.duration) || 0;
                if (!duration || !isFinite(duration)) return [];

                const points = [0.15, 0.5, 0.85]
                    .slice(0, count)
                    .map((p) => Math.max(0, Math.min(duration - 0.05, duration * p)));

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                if (!ctx) return [];

                const maxW = 448;
                const scale = Math.min(1, maxW / (video.videoWidth || maxW));
                canvas.width = Math.max(1, Math.round((video.videoWidth || maxW) * scale));
                canvas.height = Math.max(1, Math.round((video.videoHeight || maxW) * scale));

                const frames = [];

                for (const t of points) {
                    await withTimeout(
                        () =>
                            new Promise((resolve, reject) => {
                                const onSeeked = () => resolve();
                                const onError = () => reject(new Error('视频抽帧失败'));
                                video.addEventListener('seeked', onSeeked, { once: true });
                                video.addEventListener('error', onError, { once: true });
                                video.currentTime = t;
                            }),
                        3500,
                        '关键帧抽取'
                    );

                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    frames.push(canvas.toDataURL('image/jpeg', 0.72));
                }

                return frames;
            } finally {
                URL.revokeObjectURL(objectUrl);
            }
        }

        async function describeImageOrVideo(file, frames, apiKey) {
            if (!apiKey) return '';
            const isImage = file.type.startsWith('image/');
            const isVideo = file.type.startsWith('video/');
            if (!isImage && !isVideo) return '';

            const content = [
                {
                    type: 'text',
                    text: isImage
                        ? '请简要描述这张图片中宠物的动作、情绪和场景。用中文，50字内。'
                        : '这些是同一段视频的关键帧。请概括宠物在做什么、情绪如何、环境如何。用中文，80字内。'
                }
            ];

            if (isImage) {
                const imageDataUrl = await fileToDataUrl(file);
                content.push({ type: 'image_url', image_url: { url: imageDataUrl } });
            } else {
                frames.forEach((frame) => content.push({ type: 'image_url', image_url: { url: frame } }));
            }

            const resp = await fetchWithTimeout(SYSTEM_CONFIG.url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: SYSTEM_CONFIG.model,
                    messages: [{ role: 'user', content }],
                    temperature: 0.4
                })
            }, 20000);

            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error(`画面识别失败：${resp.status} ${errText || ''}`);
            }
            
            const data = await resp.json();
            return data?.choices?.[0]?.message?.content?.trim() || '';
        }

        async function roastByContext({ transcript, visualDesc, file, apiKey, pet }) {
            if (!apiKey) return '';

            const prompt = [
                PROMPTS[pet] || PROMPTS.cat,
                '',
                `输入文件类型：${file.type || 'unknown'}`,
                transcript ? `语音转写：${transcript}` : '语音转写：<无或失败>',
                visualDesc ? `画面描述：${visualDesc}` : '画面描述：<无或失败>',
                '',
                '请只输出最终吐槽台词，不要解释。'
            ].join('\n');

            const resp = await fetchWithTimeout(SYSTEM_CONFIG.url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: SYSTEM_CONFIG.model,
                    messages: [{ role: 'user', content: prompt }],
                    temperature: 0.9
                })
            }, 20000);

            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error(`AI生成失败：${resp.status} ${errText || ''}`.trim());
            }

            const data = await resp.json();
            return data?.choices?.[0]?.message?.content?.trim() || '';
        }

        // ========== 事件绑定（修复：所有功能按钮）==========
        function bindRetry() {
            const retryBtn = document.getElementById('retryBtn');
            if (!retryBtn) return;
            retryBtn.addEventListener('click', () => {
                // 重试时重新开始录音
                startRecording();
            });
        }

        // 新增：返回主界面按钮绑定
        function bindBackBtn() {
            const backBtn = document.getElementById('backBtn');
            if (!backBtn) return;
            backBtn.addEventListener('click', () => {
                setView('idle'); // 返回主界面
            });
        }

        function bindMainAction() {
            const mainBtn = document.getElementById('mainActionBtn');
            if (!mainBtn) return;
            mainBtn.addEventListener('click', () => {
                // 点击录音按钮开始录音（替代原来的直接显示文案）
                startRecording();
            });
        }

        function bindFileUpload() {
            const input = document.getElementById('fileUpload');
            if (!input) return;

            input.addEventListener('change', async () => {
                const file = input.files?.[0];
                input.value = ''; // 允许重复选择同一文件
                if (!file) return;

                const apiKey = getApiKey();
                if (!apiKey) {
                    alert('请先输入有效的 DeepSeek API Key（以 sk- 开头）');
                    return;
                }

                setView('loading');
                updateLoadingText('正在拆解文件...', '抽取语音与画面信息 📂', currentPet === 'cat' ? '🐱' : '🐶');

                const type = file.type || 'unknown';
                const sizeMB = file.size / (1024 * 1024);
                const advancedVision = isAdvancedVisionEnabled();

                try {
                    if (sizeMB > 80) throw new Error('文件太大（>80MB），建议先压缩后再传');

                    let transcript = '';
                    let frames = [];
                    let visualDesc = '';

                    // 处理音频/视频转写
                    if (type.startsWith('audio/') || type.startsWith('video/')) {
                        updateLoadingText('正在转写语音...', '这一步可能需要几秒 ⏳', currentPet === 'cat' ? '🐱' : '🐶');
                        transcript = await withTimeout(() => transcribeMedia(file, apiKey), 28000, '语音转写');
                    }

                    // 处理视频抽帧
                    if (type.startsWith('video/') && advancedVision) {
                        updateLoadingText('正在分析视频画面...', '抽取关键帧并识别场景 🎬', currentPet === 'cat' ? '🐱' : '🐶');
                        frames = await withTimeout(() => extractVideoFrames(file, 3), 12000, '视频抽帧');
                    }

                    // 处理图片/视频画面识别
                    if (type.startsWith('image/') || (type.startsWith('video/') && advancedVision)) {
                        updateLoadingText('正在理解画面内容...', '读取宠物动作和情绪 😊', currentPet === 'cat' ? '🐱' : '🐶');
                        visualDesc = await withTimeout(() => describeImageOrVideo(file, frames, apiKey), 16000, '画面识别');
                    }

                    // 生成最终文案
                    updateLoadingText('正在生成吐槽文案...', '把识别结果交给 AI 🧠', currentPet === 'cat' ? '🐱' : '🐶');
                    const finalText = await roastByContext({ transcript, visualDesc, file, apiKey, pet: currentPet });

                    // 延迟显示结果（优化：避免文案过早出现）
                    setTimeout(() => {
                        setView('result');
                        setResultText(finalText || pickFallback(currentPet));
                    }, 800);

                } catch (err) {
                    // 失败时延迟显示兜底文案
                    setTimeout(() => {
                        setView('result');
                        setResultText(
                            `文件：${type}（${sizeMB.toFixed(1)}MB）\n${err.message}\n\n已切换离线兜底：\n${pickFallback(currentPet)}`
                        );
                    }, 1200);
                }
            });
        }

        // ========== 页面初始化 ==========
        window.addEventListener('DOMContentLoaded', () => {
            const ua = navigator.userAgent || '';
            const isWeChat = /MicroMessenger/i.test(ua);
            const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(ua);
            const isSecure = location.protocol === 'https:' || location.hostname === 'localhost';
            const tip = document.getElementById('wechatOpenTip');

            // 微信/HTTPS 提示
            if (isMobile && tip) {
                tip.style.display = 'block';
                if (!isSecure) {
                    tip.textContent = '当前不是 HTTPS，微信里麦克风/相机会被限制。请上传到 HTTPS 链接后再转发。';
                } else if (isWeChat) {
                    tip.textContent = '微信内已优化显示。若录音失败，请点右上角“在浏览器打开”。';
                } else {
                    tip.textContent = '手机版已优化。建议通过 HTTPS 链接分享，别人点开即用。';
                }
            }

            // 绑定物种切换
            document.getElementById('catBtn')?.addEventListener('click', () => setActivePet('cat'));
            document.getElementById('dogBtn')?.addEventListener('click', () => setActivePet('dog'));

            // 初始化默认状态
            setActivePet('cat');
            if (!isMobile) bindButtonParticles();
            
            // 绑定所有功能
            bindToggleKey();
            bindRetry();
            bindBackBtn(); // 新增：返回按钮
            bindMainAction();
            bindFileUpload();
            bindCameraFunctions(); // 修复：拍照功能
            
            // 初始显示主界面
            setView('idle');
        });
    </script>
