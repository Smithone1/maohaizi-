<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <meta property="og:image" content="cat-icon.png">
    <link rel="icon" type="image/png" href="cat-icon.png">
    <title>🐾 毛孩子心事档案馆 🐾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        // 🔥 纯本地文案（无网络、无API）
        const FALLBACK = {
            cat: [
                "朕乏了，莫挨老子。", "罐头呢？没有就退下吧。", "摸够了没？该干嘛干嘛去。",
                "这地盘是朕的，你只是暂住。", "敢动朕的窝？挠你没商量。", "喂饭都不准时，要你何用。",
                "别拍了，朕不想营业。", "抱我？看朕心情再说。", "零食拿来，朕就原谅你。",
                "吵到朕睡觉，罚你今晚铲屎。", "人类真无聊，还是睡觉舒服。", "这破地方，也就朕能将就。",
                "想撸我？先去把罐罐开了。", "朕允许你摸三下，多一下不行。", "哼，区区人类也敢指挥朕？"
            ],
            dog: [
                "别叫，起不来，根本起不来。", "出门？算了吧，外面好累。", "干啥都没劲，只想趴着。",
                "吃饭可以，出门免谈。", "别拉我，我和地板锁死了。", "能躺绝不坐，能睡绝不醒。",
                "不想动，一动就累。", "摆烂中，请勿打扰。", "遛弯？下次一定，下次一定。",
                "四肢健全，就是不想动。", "人生苦短，不如躺平。", "叫我也没用，耳朵自动屏蔽。",
                "零食到嘴边，我再考虑起身。", "佛系小狗，万事随缘。", "今天运动量：眨了眨眼。"
            ]
        };
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mood-pink': '#FF6B9D', 'mood-blue': '#4A9FFF', 'bg-dark': '#1a1a2e', 'bg-card': '#16213e'
                    },
                    keyframes: {
                        wave: { '0%,100%': { transform: 'scaleY(0.5)' }, '50%': { transform: 'scaleY(1)' } },
                        recordPulse: {
                            '0%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(255,107,157,0.7)' },
                            '70%': { transform: 'scale(1.05)', boxShadow: '0 0 0 15px rgba(255,107,157,0)' },
                            '100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(255,107,157,0)' }
                        },
                        dogPulse: {
                            '0%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(74,159,255,0.7)' },
                            '70%': { transform: 'scale(1.05)', boxShadow: '0 0 0 15px rgba(74,159,255,0)' },
                            '100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(74,159,255,0)' }
                        }
                    },
                    animation: {
                        wave: 'wave 0.8s infinite ease-in-out',
                        recordPulse: 'recordPulse 1.5s infinite',
                        dogPulse: 'dogPulse 1.5s infinite'
                    }
                }
            }
        }
    </script>
    <style>
        body{background:#1a1a2e;font-family:system-ui,sans-serif}
        .glass-bg{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1)}
        .tab-slider{position:absolute;top:4px;left:4px;width:calc(50% - 6px);height:calc(100% - 8px);border-radius:10px;background:rgba(255,107,157,0.15);transition:.3s}
        .pet-tabs{position:relative;display:flex;padding:4px;border-radius:14px;background:rgba(255,255,255,0.03)}
        .record-dot{width:8px;height:8px;border-radius:50%;background:#FF6B9D;animation:wave 0.8s infinite}
        .record-dot:nth-child(2){animation-delay:.2s}.record-dot:nth-child(3){animation-delay:.4s}
        .dog-dot{background:#4A9FFF}
    </style>
</head>
<body class="min-h-screen text-white flex flex-col items-center justify-center p-4">
    <div class="relative z-10 w-full max-w-lg">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black bg-gradient-to-r from-mood-pink to-mood-blue bg-clip-text text-transparent">🐾 毛孩子心事档案馆 🐾</h1>
            <p class="text-gray-400 text-sm mt-2">别说话，听它吐槽你...</p>
        </div>
        <div class="glass-bg rounded-3xl p-6">
            <!-- 物种切换 -->
            <div class="pet-tabs mb-6">
                <div id="slider" class="tab-slider"></div>
                <button id="catBtn" class="flex-1 py-4 text-white font-bold z-10">🐱 猫主子</button>
                <button id="dogBtn" class="flex-1 py-4 text-gray-400 font-bold z-10">🐶 摆烂狗</button>
            </div>
            <!-- 主界面 -->
            <div id="home" class="flex flex-col items-center">
                <button id="recordBtn" class="w-32 h-32 rounded-full bg-gradient-to-br from-mood-pink to-mood-purple text-5xl shadow-lg flex items-center justify-center">
                    <i class="fa fa-microphone"></i>
                </button>
                <p class="text-gray-300 mt-4 mb-6" id="hint">录下毛孩子的声音...</p>
                <div class="flex gap-4 w-full">
                    <button id="photoBtn" class="flex-1 py-3 bg-green-500 rounded-xl font-bold">📸 拍照识别</button>
                    <button id="uploadBtn" class="flex-1 py-3 bg-purple-500 rounded-xl font-bold">📁 上传文件</button>
                </div>
            </div>
            <!-- 录音加载动画 -->
            <div id="loading" class="hidden flex flex-col items-center py-6">
                <div id="pulse" class="w-24 h-24 rounded-full animate-recordPulse flex items-center justify-center text-4xl">
                    <i class="fa fa-microphone"></i>
                </div>
                <div class="flex gap-1 mt-6">
                    <div class="record-dot"></div>
                    <div class="record-dot"></div>
                    <div class="record-dot"></div>
                </div>
                <p class="text-gray-400 mt-4">正在解析心声...</p>
            </div>
            <!-- 结果页（带返回按钮） -->
            <div id="result" class="hidden flex flex-col items-center">
                <div class="text-7xl mb-4" id="emoji">🐱</div>
                <div class="w-full bg-bg-card p-5 rounded-2xl border border-gray-700 mb-6">
                    <p id="text" class="text-lg"></p>
                </div>
                <div class="flex gap-4 w-full">
                    <button id="backBtn" class="flex-1 py-3 bg-blue-500 rounded-xl font-bold">← 返回主页</button>
                    <button id="againBtn" class="flex-1 py-3 bg-gray-700 rounded-xl font-bold">🔄 再来一句</button>
                </div>
            </div>
        </div>
    </div>
<script>
let pet = 'cat';
const $ = id => document.getElementById(id);

// 切换物种
function switchPet(type){
    pet = type;
    $('slider').style.transform = type==='cat'?'translateX(0)':'translateX(100%)';
    $('catBtn').className = `flex-1 py-4 ${type==='cat'?'text-white':'text-gray-400'} font-bold z-10`;
    $('dogBtn').className = `flex-1 py-4 ${type==='dog'?'text-white':'text-gray-400'} font-bold z-10`;
    $('pulse').className = type==='cat'?'w-24 h-24 rounded-full animate-recordPulse flex items-center justify-center text-4xl':'w-24 h-24 rounded-full animate-dogPulse flex items-center justify-center text-4xl';
    document.querySelectorAll('.record-dot').forEach(d=>d.className=type==='cat'?'record-dot':'record-dot dog-dot');
    $('hint').innerText = type==='cat'?'录下猫主子的圣旨...':'录下摆烂狗的心声...';
    $('emoji').innerText = type==='cat'?'🐱':'🐶';
}

// 随机文案
function randomText(){
    const arr = FALLBACK[pet];
    return arr[Math.floor(Math.random()*arr.length)];
}

// 显示结果（延迟1.5秒，解决文案太快）
function showResult(){
    $('loading').classList.add('hidden');
    $('result').classList.remove('hidden');
    $('text').innerText = randomText();
}

// 视图切换
function goLoading(){
    $('home').classList.add('hidden');
    $('result').classList.add('hidden');
    $('loading').classList.remove('hidden');
    setTimeout(showResult,1500);
}

// 事件绑定
$('catBtn').onclick = ()=>switchPet('cat');
$('dogBtn').onclick = ()=>switchPet('dog');
$('recordBtn').onclick = goLoading;
$('photoBtn').onclick = goLoading;
$('uploadBtn').onclick = goLoading;
$('againBtn').onclick = goLoading;
$('backBtn').onclick = ()=>{
    $('result').classList.add('hidden');
    $('home').classList.remove('hidden');
};

// 初始化
switchPet('cat');
</script>
</body>
</html>
