<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FF6B9D">
    <meta property="og:title" content="🐾 毛孩子心事档案馆">
    <meta property="og:description" content="一键听懂猫猫狗狗心里话｜超萌宠物翻译器">
    <meta property="og:type" content="website">
    <meta property="og:url" content="/">
    <meta property="og:image" content="https://picsum.photos/200/200">
    <meta property="og:image:width" content="200">
    <meta property="og:image:height" content="200">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="🐾 毛孩子心事档案馆">
    <meta name="twitter:description" content="宠物翻译器｜听懂毛孩子心声">
    <meta name="description" content="超萌宠物翻译器，猫猫狗狗心里话一键解析">
    <title>🐾 毛孩子心事档案馆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        const CAT_IMG = "./cat-icon.png";
        const DOG_IMG = "./dog-icon.png";
        
        const FALLBACK = {
            cat: ["朕乏了，莫挨老子。", "罐头呢？没有就退下吧。", "摸够了没？该干嘛干嘛去。", "这地盘是朕的，你只是暂住。", "敢动朕的窝？挠你没商量。", "喂饭都不准时，要你何用。", "别拍了，朕不想营业。", "抱我？看朕心情再说。", "零食拿来，朕就原谅你。", "吵到朕睡觉，罚你今晚铲屎。", "人类真无聊，还是睡觉舒服。", "这破地方，也就朕能将就。", "想撸我？先去把罐罐开了。", "朕允许你摸三下，多一下不行。", "哼，区区人类也敢指挥朕？"],
            dog: ["别跟我谈理想，我的理想是躺平","让我动？除非零食直接砸脸","干饭不积极，狗生绝对有问题","出门免谈，社恐犯了只想装死","不听不听，本修勾主打反骨","今日运动量：翻了个身而已","别PUA我，狗生只需要吃饱睡","遛弯五分钟，躺平回血两小时","没罐罐？别跟我废话半句","地板太粘脚，真的一步走不动","人类太内卷，我选择躺平成仙","想拿捏我？先拿零食来试试","思考狗生？不如思考下顿吃啥","装睡中，铲屎的别来烦我","活着就行，要啥上进心啊"]
        };

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mood-pink': '#FF6B9D',
                        'mood-blue': '#4A9FFF',
                        'bg-dark': '#1a1a2e',
                        'bg-card': '#16213e',
                    },
                    keyframes: {
                        wave: {'0%,100%':{transform:'scaleY(0.5)'},'50%':{transform:'scaleY(1)'}},
                        pulse: {'0%':{transform:'scale(1)',boxShadow:'0 0 0 0 rgba(255,107,157,0.7)'},'70%':{transform:'scale(1.05)',boxShadow:'0 0 0 15px rgba(255,107,157,0)'},'100%':{transform:'scale(1)',boxShadow:'0 0 0 0 rgba(255,107,157,0)'}},
                        pulseBlue: {'0%':{transform:'scale(1)',boxShadow:'0 0 0 0 rgba(74,159,255,0.7)'},'70%':{transform:'scale(1.05)',boxShadow:'0 0 0 15px rgba(74,159,255,0)'},'100%':{transform:'scale(1)',boxShadow:'0 0 0 0 rgba(74,159,255,0)'}}
                    },
                    animation: {wave:'wave 0.8s infinite',pulse:'pulse 1.5s infinite',pulseBlue:'pulseBlue 1.5s infinite'}
                }
            }
        }
    </script>
    <style>
        body {
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Arial Rounded MT Bold", sans-serif;
            margin: 0; padding: 0;
        }
        .glass-bg { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-slider { position: absolute; top:4px; left:4px; width: calc(50% - 6px); height: calc(100% - 8px); border-radius:10px; background: rgba(255,107,157,0.15); transition:.3s; }
        .pet-tabs { position: relative; display: flex; padding:4px; border-radius:14px; background: rgba(255,255,255,0.03); }
        .dot { width:8px; height:8px; border-radius:50%; background:#FF6B9D; animation: wave 0.8s infinite; }
        .dot.blue { background:#4A9FFF; }
        .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
        .particle{position:fixed;pointer-events:none;border-radius:50%;z-index:10000}
        #video{transform:scaleX(-1)}
        .pet-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.2)}
        .result-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.3)}
    </style>
</head>
<body class="text-white flex flex-col items-center justify-center p-4 min-h-screen">
<div class="relative z-10 w-full max-w-lg">
    <div class="text-center mb-6">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-mood-pink to-mood-blue bg-clip-text text-transparent">🐾 毛孩子心事档案馆</h1>
    </div>
    <div class="glass-bg rounded-3xl p-6">
        <div class="pet-tabs mb-6">
            <div id="slider" class="tab-slider"></div>
            <button id="catBtn" class="flex-1 py-4 text-white font-bold z-10 flex items-center justify-center gap-2">
                <img src="./cat-icon.png" class="pet-avatar" alt="猫"> 软萌喵
            </button>
            <button id="dogBtn" class="flex-1 py-4 text-gray-400 font-bold z-10 flex items-center justify-center gap-2">
                <img src="./dog-icon.png" class="pet-avatar" alt="狗"> 奶萌汪
            </button>
        </div>
        <div id="home" class="flex flex-col items-center">
            <button id="recordBtn" class="w-32 h-32 rounded-full bg-gradient-to-br from-mood-pink to-mood-purple flex items-center justify-center text-5xl shadow-lg">
                <i class="fa fa-microphone"></i>
            </button>
            <p class="my-4 text-gray-300">点击录制毛孩子声音</p>
            <div class="flex gap-3 w-full">
                <button id="cameraBtn" class="flex-1 py-3 bg-green-500 rounded-xl font-bold">📸 拍照识别</button>
                <button id="fileBtn" class="flex-1 py-3 bg-purple-500 rounded-xl font-bold">📁 上传文件</button>
            </div>
        </div>
        <div id="recording" class="hidden flex-col items-center py-6">
            <div id="pulseIcon" class="w-24 h-24 rounded-full animate-pulse flex items-center justify-center text-4xl mb-6">
                <i class="fa fa-microphone"></i>
            </div>
            <div class="flex gap-1"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <p class="mt-4 text-gray-300">录音中…点击停止</p>
            <button id="stopRecord" class="mt-6 py-3 px-6 bg-red-50 rounded-xl">停止录音</button>
        </div>
        <div id="loading" class="hidden flex-col items-center py-8">
            <div class="flex gap-1"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <p class="mt-4 text-gray-400">解析心声中…</p>
        </div>
        <div id="result" class="hidden flex-col items-center">
            <img id="resultAvatar" src="./cat-icon.png" class="result-avatar mb-4" alt="头像">
            <div class="w-full bg-bg-card p-5 rounded-2xl border border-gray-700 mb-6">
                <p id="resultText" class="text-lg"></p>
            </div>
            <div class="flex gap-4 w-full">
                <button id="backBtn" class="flex-1 py-3 bg-blue-500 rounded-xl">← 返回主页</button>
                <button id="retryBtn" class="flex-1 py-3 bg-gray-700 rounded-xl">再来一句</button>
            </div>
        </div>
    </div>
</div>
<div id="cameraLayer" class="fixed inset-0 z-50 hidden bg-black flex flex-col">
    <video id="video" autoplay playsinline class="flex-1 w-full object-cover"></video>
    <div class="absolute bottom-10 left-0 right-0 flex justify-center gap-3 px-4">
        <button id="switchCam" class="py-3 px-4 bg-white/20 backdrop-blur rounded-full text-white">切换镜头</button>
        <button id="takePhoto" class="py-3 px-8 bg-white rounded-full text-black font-bold">拍照</button>
        <button id="closeCam" class="py-3 px-4 bg-red-500 rounded-full text-white">关闭</button>
    </div>
</div>
<input type="file" id="fileInput" class="hidden" accept="*">
<script>
    let pet = "cat";
    let camStream = null;
    let camMode = "environment";
    const $ = id => document.getElementById(id);

    // ================== 仅新增 粒子特效（无冲突，不影响原有功能）==================
    function createParticles(x, y) {
        const color = pet === "cat" ? "#FF6B9D" : "#4A9FFF";
        for (let i = 0; i < 18; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            const size = Math.random() * 9 + 4;
            p.style.cssText = `width:${size}px;height:${size}px;background:${color};box-shadow:0 0 8px ${color};left:${x}px;top:${y}px;border-radius:50%`;
            document.body.appendChild(p);
            let vx = Math.cos(Math.random()*Math.PI*2) * (Math.random()*5+2);
            let vy = Math.sin(Math.random()*Math.PI*2) * (Math.random()*5+2);
            let op = 1;
            !function run(){
                p.style.left = parseFloat(p.style.left)+vx+"px";
                p.style.top = parseFloat(p.style.top)+vy+"px";
                op -= 0.025; p.style.opacity = op;
                op>0 ? requestAnimationFrame(run) : p.remove();
            }();
        }
    }
    // 追加绑定，不覆盖原有点击事件
    document.querySelectorAll("button").forEach(btn=>{
        btn.addEventListener("click",e=>createParticles(e.clientX,e.clientY));
    });
    // =================================================================================

    function refreshUI(){
        $("slider").style.transform = pet==="cat"?"translateX(0)":"translateX(100%)";
        $("catBtn").classList.toggle("text-white",pet==="cat");
        $("catBtn").classList.toggle("text-gray-400",pet!=="cat");
        $("dogBtn").classList.toggle("text-white",pet==="dog");
        $("dogBtn").classList.toggle("text-gray-400",pet!=="dog");
        $("pulseIcon").className = `w-24 h-24 rounded-full ${pet==="cat"?"animate-pulse":"animate-pulseBlue"} flex items-center justify-center text-4xl mb-6`;
        document.querySelectorAll(".dot").forEach(d=>d.classList.toggle("blue",pet==="dog"));
        $("resultAvatar").src = pet==="cat"?CAT_IMG:DOG_IMG;
    }

    const randomText=()=>FALLBACK[pet][Math.floor(Math.random()*FALLBACK[pet].length)];
    const view=name=>{["home","recording","loading","result"].forEach(v=>$(v).classList.toggle("hidden",v!==name));if(name!=="cameraLayer"&&camStream)camStream.getTracks().forEach(t=>t.stop());};
    const openCam=async()=>{try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:camMode}});$("video").srcObject=camStream;$("cameraLayer").classList.remove("hidden");}catch{view("loading");setTimeout(()=>{view("result");$("resultText").innerText=randomText()},1600);}};

    $("catBtn").onclick=()=>{pet="cat";refreshUI();};
    $("dogBtn").onclick=()=>{pet="dog";refreshUI();};
    $("recordBtn").onclick=()=>view("recording");
    $("stopRecord").onclick=()=>{view("loading");setTimeout(()=>{view("result");$("resultText").innerText=randomText()},1600);};
    $("cameraBtn").onclick=openCam;
    $("switchCam").onclick=()=>{camMode=camMode==="user"?"environment":"user";openCam();};
    $("takePhoto").onclick=()=>{camStream.getTracks().forEach(t=>t.stop());$("cameraLayer").classList.add("hidden");view("loading");setTimeout(()=>{view("result");$("resultText").innerText=randomText()},1600);};
    $("closeCam").onclick=()=>{camStream.getTracks().forEach(t=>t.stop());$("cameraLayer").classList.add("hidden");view("home");};
    $("fileBtn").onclick=()=>$("fileInput").click();
    $("fileInput").onchange=()=>{view("loading");setTimeout(()=>{view("result");$("resultText").innerText=randomText()},1600);};
    $("backBtn").onclick=()=>view("home");
    $("retryBtn").onclick=()=>{view("loading");setTimeout(()=>{view("result");$("resultText").innerText=randomText()},1600);};

    refreshUI();
</script>
</body>
</html>
